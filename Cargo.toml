[package]
name = "urm37"
version = "0.4.0"
edition = "2021"
authors = ["Paul TESSON <paul.tesson.officiel@gmail.com>"]
description = "Platform-agnostic no_std driver for the DFRobot URM37 V5.0 ultrasonic distance sensor (UART, PWM, Analog)"
license = "MIT OR Apache-2.0"
repository = "https://github.com/TESSON-MAKER/urm37"
documentation = "https://docs.rs/urm37"
keywords = ["embedded", "driver", "ultrasonic", "urm37", "no-std"]
categories = ["embedded", "no-std", "hardware-support"]
readme = "README.md"

[dependencies]
embedded-hal       = { version = "1.0", optional = true }
embedded-hal-async = { version = "1.0", optional = true }
embedded-io        = { version = "0.6", optional = true }
embedded-io-async  = { version = "0.6", optional = true }
defmt              = { version = "0.3", optional = true }

[features]
default = []

# Synchronous UART mode (embedded-io)
uart = ["dep:embedded-io"]

# Asynchronous UART mode (embedded-io-async)
uart-async = ["dep:embedded-io", "dep:embedded-io-async"]

# PWM trigger mode (GPIO + pulse width measurement)
pwm = ["dep:embedded-hal", "dep:embedded-hal-async"]

# Analog mode (ADC)
analog = ["dep:embedded-hal"]

# defmt logging on error types
defmt = ["dep:defmt"]

[dev-dependencies]
embassy-executor = { version = "0.5", features = ["arch-cortex-m"] }
embassy-stm32 = { version = "0.6", features = ["stm32l476rg", "memory-x"] }
embassy-time = "0.3"
embassy-futures = "0.1"
defmt = "0.3"
defmt-rtt = "0.4"
cortex-m-rt = "0.7"